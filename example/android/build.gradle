allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// AGP 8+ requires `namespace` on every Android library; some pub plugins predate this field.
// Apply as the library plugin is applied (before variant configuration), not in afterEvaluate.
subprojects { sub ->
    sub.pluginManager.withPlugin("com.android.library") {
        def legacyNamespaces = [
                "fijkplayer"      : "com.befovy.fijkplayer",
                "flutter_webrtc"  : "com.cloudwebrtc.webrtc",
        ]
        def pkg = legacyNamespaces[sub.name]
        if (pkg != null) {
            sub.android.namespace = pkg
        }
    }
}

rootProject.buildDir = file("../build")
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
